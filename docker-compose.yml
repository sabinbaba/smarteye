services:
  hybrid-ids:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    image: hybrid-ids:latest
    container_name: hybrid-ids-app
    restart: unless-stopped

    ports:
      - "8090:8090"

    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      PYTHONUNBUFFERED: "1"
      INTERFACE: ${NETWORK_INTERFACE:-eth0}
      MAX_PACKETS: "5000"
      DOS_PPS_THRESHOLD: "500"
      DDOS_SOURCE_THRESHOLD: "5"
      DDOS_TOTAL_PPS: "1500"
      SCAPY_SOCKET_BUFSIZE: "67108864"

    volumes:
      - ids_data:/app/data
      - ./logs:/app/logs
      - ./attack_logs.log:/app/attack_logs.log
      - ./model:/app/model:ro

    cap_add:
      - NET_ADMIN
      - NET_RAW

    security_opt:
      - no-new-privileges:true

    depends_on:
      redis:
        condition: service_healthy

  hybrid-ids-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development

    image: hybrid-ids:dev
    container_name: hybrid-ids-dev

    profiles:
      - dev

    ports:
      - "8090:8090"

    volumes:
      - .:/app
      - ids_data:/app/data

    cap_add:
      - NET_ADMIN
      - NET_RAW

    security_opt:
      - no-new-privileges:true

    command: tail -f /dev/null

  redis:
    image: redis:7-alpine
    container_name: hybrid-ids-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

volumes:
  ids_data:
  redis_data:
